<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>SmartCalc Pro</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="app-container">

        <div class="calculator">

            <!-- TOP -->

            <div class="top-bar">

                <div class="logo">
                    SmartCalc
                </div>

                <button id="menu-toggle">

                    <i class="fa-solid fa-bars"></i>

                </button>

            </div>

            <!-- NAVIGATION -->

            <div id="sidebar" class="sidebar">

                <button
                    class="nav-btn active"
                    data-mode="basic">

                    Basic

                </button>

                <button
                    class="nav-btn"
                    data-mode="scientific">

                    Scientific

                </button>

                <button
                    class="nav-btn"
                    data-mode="convert">

                    Convert

                </button>

                <button
                    class="nav-btn"
                    data-mode="settings">

                    Settings

                </button>

            </div>

            <!-- BASIC -->

            <div
                id="basic-mode"
                class="mode active-mode">

                <div class="display-section">

                    <div
                        id="previous-operation"
                        class="previous-operation">
                    </div>

                    <div
                        id="current-operation"
                        class="current-operation">
                        0
                    </div>

                </div>

                <div class="buttons-grid">

                    <button class="calc-btn utility clear">
                        AC
                    </button>

                    <button class="calc-btn utility delete">
                        DEL
                    </button>

                    <button class="calc-btn utility operator">
                        %
                    </button>

                    <button class="calc-btn operator">
                        ÷
                    </button>

                    <button class="calc-btn number">7</button>
                    <button class="calc-btn number">8</button>
                    <button class="calc-btn number">9</button>

                    <button class="calc-btn operator">
                        ×
                    </button>

                    <button class="calc-btn number">4</button>
                    <button class="calc-btn number">5</button>
                    <button class="calc-btn number">6</button>

                    <button class="calc-btn operator">
                        −
                    </button>

                    <button class="calc-btn number">1</button>
                    <button class="calc-btn number">2</button>
                    <button class="calc-btn number">3</button>

                    <button class="calc-btn operator">
                        +
                    </button>

                    <button class="calc-btn number zero">
                        0
                    </button>

                    <button class="calc-btn number">
                        .
                    </button>

                    <button class="calc-btn equals">
                        =
                    </button>

                </div>

            </div>

            <!-- SCIENTIFIC -->

            <div
                id="scientific-mode"
                class="mode">

                <div class="display-section">

                    <div
                        id="scientific-expression"
                        class="previous-operation">
                    </div>

                    <div
                        id="scientific-result"
                        class="current-operation">
                        0
                    </div>

                </div>

                <div class="scientific-grid">

                    <button class="calc-btn sci-btn">7</button>
                    <button class="calc-btn sci-btn">8</button>
                    <button class="calc-btn sci-btn">9</button>
                    <button class="calc-btn sci-btn">√</button>

                    <button class="calc-btn sci-btn">4</button>
                    <button class="calc-btn sci-btn">5</button>
                    <button class="calc-btn sci-btn">6</button>
                    <button class="calc-btn sci-btn">x²</button>

                    <button class="calc-btn sci-btn">1</button>
                    <button class="calc-btn sci-btn">2</button>
                    <button class="calc-btn sci-btn">3</button>
                    <button class="calc-btn sci-btn">sin</button>

                    <button class="calc-btn sci-btn">0</button>
                    <button class="calc-btn sci-btn">.</button>
                    <button class="calc-btn sci-btn">cos</button>
                    <button class="calc-btn sci-btn">tan</button>

                    <button class="calc-btn sci-btn">log</button>
                    <button class="calc-btn sci-btn">ln</button>
                    <button class="calc-btn sci-btn">π</button>
                    <button class="calc-btn sci-btn">e</button>

                    <button class="calc-btn sci-btn">1/x</button>
                    <button class="calc-btn sci-btn">x!</button>

                    <button class="calc-btn sci-clear">
                        AC
                    </button>

                    <button class="calc-btn sci-equals">
                        =
                    </button>

                </div>

            </div>

            <!-- CONVERTER -->

            <div
                id="convert-mode"
                class="mode">

                <div class="display-section">

                    <div class="previous-operation">

                        Currency Converter

                    </div>

                    <div
                        id="convert-display"
                        class="current-operation">

                        0

                    </div>

                </div>

                <div class="convert-section">

                    <select id="from-currency">

                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="NGN">NGN</option>
                        <option value="BTC">BTC</option>
                        <option value="ETH">ETH</option>
                        <option value="AUD">AUD</option>
                        <option value="CAD">CAD</option>
                        <option value="INR">INR</option>

                    </select>
                    <p>to</p>

                    <select id="to-currency">

                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="NGN">NGN</option>
                        <option value="BTC">BTC</option>
                        <option value="ETH">ETH</option>
                        <option value="AUD">AUD</option>
                        <option value="CAD">CAD</option>    
                        <option value="INR">INR</option>
                        

                    </select>

                    <div class="converter-pad">

                        <button class="calc-btn convert-btn">
                            7
                        </button>

                        <button class="calc-btn convert-btn">
                            8
                        </button>

                        <button class="calc-btn convert-btn">
                            9
                        </button>

                        <button class="calc-btn convert-btn">
                            4
                        </button>

                        <button class="calc-btn convert-btn">
                            5
                        </button>

                        <button class="calc-btn convert-btn">
                            6
                        </button>

                        <button class="calc-btn convert-btn">
                            1
                        </button>

                        <button class="calc-btn convert-btn">
                            2
                        </button>

                        <button class="calc-btn convert-btn">
                            3
                        </button>

                        <button class="calc-btn convert-btn">
                            0
                        </button>

                        <button
                            class="calc-btn"
                            id="convert-clear">

                            AC

                        </button>

                        <button
                            class="calc-btn operator"
                            id="convert-equals">

                            =

                        </button>

                    </div>

                    <div id="conversion-result">

                        Result: 0

                    </div>

                </div>

            </div>

            <!-- SETTINGS -->

            <div
                id="settings-mode"
                class="mode">

                <div class="settings-section">

                    <button
                        id="dark-theme"
                        class="theme-btn">

                        Dark Mode

                    </button>

                    <button
                        id="light-theme"
                        class="theme-btn">

                        Light Mode

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
